   <!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>듀핫 클릭커 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-animation {
            0% { transform: scale(1); }
            50% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }
        .heart-beat {
            animation: pulse-animation 0.5s ease-in-out;
        }
        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="bg-rose-50 min-h-screen flex flex-col items-center justify-center p-4 font-sans text-rose-900">

    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center border-4 border-rose-200">
        <h1 class="text-3xl font-bold mb-2">듀핫 클릭커</h1>
        <p class="text-rose-500 mb-6 font-medium">하트를 눌러 사랑을 채워주세요!</p>

        <div class="my-8">
            <span class="text-6xl font-extrabold text-rose-600" id="loveCount">0</span>
            <p class="text-sm uppercase tracking-widest text-rose-400 mt-2">사랑지수</p>
        </div>

        <button id="heartBtn" class="focus:outline-none transition-transform duration-100 ease-out active:scale-95">
            <svg class="w-48 h-48 mx-auto float-animation text-rose-500 hover:text-rose-400" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>
        </button>
        
        <p class="mt-8 text-xs text-rose-300">© 2026 DewHeart Studio</p>
    </div>

    <script>
        let loveIndex = 0;
        const countDisplay = document.getElementById('loveCount');
        const heartBtn = document.getElementById('heartBtn');

        heartBtn.addEventListener('click', () => {
            // 사랑지수 증가
            loveIndex++;
            countDisplay.innerText = loveIndex;

            // 클릭 애니메이션 효과
            heartBtn.classList.add('heart-beat');
            setTimeout(() => {
                heartBtn.classList.remove('heart-beat');
            }, 500);

            // 콘솔 메시지 (선택적)
            console.log(`현재 사랑지수: ${loveIndex}`);
        });
    </script>
</body>
</html>
