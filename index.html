<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파미리 폭파</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(3px, 2px) rotate(0deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            80% { transform: translate(3px, 1px) rotate(-1deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shaking { animation: shake 0.3s infinite; }
        .glitch-text { text-shadow: 2px 0 red, -2px 0 blue; }
        #console-log { font-family: 'Courier New', monospace; }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center p-4">

    <div id="app" class="w-full max-w-md bg-[#16181c] border border-gray-800 rounded-2xl overflow-hidden shadow-2xl">
        
        <div class="p-4 border-b border-gray-800 flex justify-between items-center">
            <h1 class="text-xl font-bold italic text-yellow-400">파미리 폭파</h1>
            <button id="destroy-btn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-full transition-all">
                폭파 실행
            </button>
            <button id="reset-btn" class="hidden bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-full transition-all">
                다시 터트리기
            </button>
        </div>

        <div id="profile-container" class="p-6">
            <!-- 기본 프사 -->
            <div class="w-24 h-24 bg-gray-600 rounded-full mb-4 flex items-center justify-center text-4xl">👤</div>
            <h2 class="text-2xl font-extrabold text-white">파미리</h2>
            <p class="text-gray-400 mb-4">@pamiri_official</p>
            <p class="text-gray-300">이 계정은 곧 '펑'하고 사라집니다. 준비되셨나요?</p>
        </div>

        <div id="console-log" class="p-4 bg-black text-green-400 text-sm h-32 overflow-y-auto border-t border-gray-800">
            <div>시스템 대기 중...</div>
        </div>
    </div>

    <script>
        const destroyBtn = document.getElementById('destroy-btn');
        const resetBtn = document.getElementById('reset-btn');
        const consoleLog = document.getElementById('console-log');
        const profileContainer = document.getElementById('profile-container');
        const app = document.getElementById('app');

        const originalProfileHTML = profileContainer.innerHTML;

        // "펑" 소리를 위한 합성기 (MembraneSynth + Noise 조합)
        const bangSynth = new Tone.MembraneSynth({
            pitchDecay: 0.05,
            octaves: 10,
            oscillator: { type: "sine" },
            envelope: { attack: 0.001, decay: 0.4, sustain: 0, release: 0.2 }
        }).toDestination();

        const noise = new Tone.NoiseSynth({
            noise: { type: "white" },
            envelope: { attack: 0.001, decay: 0.2, sustain: 0, release: 0.1 }
        }).toDestination();

        function log(message) {
            const div = document.createElement('div');
            div.textContent = `> ${message}`;
            consoleLog.appendChild(div);
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }

        async function triggerDestruction() {
            await Tone.start();
            destroyBtn.classList.add('hidden');
            
            const steps = [
                "접속 시도 중...",
                "보안 뚫는 중...",
                "파미리 데이터 타겟팅...",
                "3...", "2...", "1...",
                "펑!!!"
            ];

            for (let i = 0; i < steps.length; i++) {
                setTimeout(() => {
                    log(steps[i]);
                    
                    if(i === steps.length - 1) {
                        app.classList.add('shaking');
                        bangSynth.triggerAttackRelease("C2", "8n");
                        noise.triggerAttackRelease("8n");
                        
                        setTimeout(() => {
                            app.classList.remove('shaking');
                            profileContainer.innerHTML = '<div class="text-center py-10"><h2 class="text-6xl mb-4">💥</h2><p class="text-xl font-bold">계정이 펑 터졌습니다!</p></div>';
                            resetBtn.classList.remove('hidden');
                        }, 500);
                    }
                }, i * 800);
            }
        }

        function resetGame() {
            profileContainer.innerHTML = originalProfileHTML;
            resetBtn.classList.add('hidden');
            destroyBtn.classList.remove('hidden');
            consoleLog.innerHTML = '<div>시스템 복구 완료. 대기 중...</div>';
        }

        destroyBtn.addEventListener('click', triggerDestruction);
        resetBtn.addEventListener('click', resetGame);
    </script>
</body>
</html>
